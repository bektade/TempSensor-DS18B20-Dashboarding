services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: tempsensor-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./stack/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/broker/version' -C 1 -W 2 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  influxdb:
    image: influxdb:2.7
    container_name: tempsensor-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_ADMIN_TOKEN}
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  telegraf:
    image: telegraf:1.32
    container_name: tempsensor-telegraf
    restart: unless-stopped
    env_file: .env
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    volumes:
      - ./stack/telegraf/telegraf.conf.template:/etc/telegraf/telegraf.conf.template:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sed \
          -e "s|INFLUXDB_ADMIN_TOKEN_PLACEHOLDER|$$INFLUXDB_ADMIN_TOKEN|g" \
          -e "s|INFLUXDB_ORG_PLACEHOLDER|$$INFLUXDB_ORG|g" \
          -e "s|INFLUXDB_BUCKET_PLACEHOLDER|$$INFLUXDB_BUCKET|g" \
          /etc/telegraf/telegraf.conf.template > /tmp/telegraf.conf
        exec telegraf --config /tmp/telegraf.conf

  mqtt-publisher:
    build:
      context: .
      dockerfile: docker/mqtt-publisher.Dockerfile
    container_name: tempsensor-mqtt-publisher
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: ${TZ:-America/Chicago}
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
    depends_on:
      mosquitto:
        condition: service_healthy
    volumes:
      - /sys/bus/w1/devices:/sys/bus/w1/devices:ro
      - ./exports:/app/exports

  grafana:
    image: grafana/grafana:11.4.0
    container_name: tempsensor-grafana
    restart: unless-stopped
    env_file: .env
    depends_on:
      influxdb:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./stack/grafana/templates/influxdb.yml.template:/etc/grafana/provisioning/datasources/influxdb.yml.template:ro
      - ./stack/grafana/dashboards/tempsensor-live.template.json:/etc/grafana/provisioning/dashboards/tempsensor-live.template.json:ro
      - ./stack/grafana/provisioning/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./scripts/grafana-entrypoint.sh:/grafana-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/grafana-entrypoint.sh"]
    environment:
      TZ: ${TZ:-America/Chicago}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DEFAULT_INSTANCE_TIMEZONE: ${TZ:-America/Chicago}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_UID: tempsensor-live

volumes:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  grafana_data:
