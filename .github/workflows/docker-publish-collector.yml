# Build and push SensorDataCollector image to Docker Hub (independent of WebApp).
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN

name: Docker Hub — SensorDataCollector

on:
  push:
    branches: [djangoWebApp]
    tags: ["collector-v*"]
    paths:
      - "SensorDataCollector/**"
      - ".github/workflows/docker-publish-collector.yml"
  pull_request:
    branches: [djangoWebApp]
    paths:
      - "SensorDataCollector/**"
      - ".github/workflows/docker-publish-collector.yml"
  workflow_dispatch:

concurrency:
  group: docker-publish-collector-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/tempsensor-mqtt-collector

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: SensorDataCollector
          file: SensorDataCollector/docker/Dockerfile
          push: false
          tags: tempsensor-mqtt-collector:ci
          cache-from: type=gha,scope=collector
          cache-to: type=gha,mode=max,scope=collector

  publish:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check Docker Hub secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Missing GitHub Actions secrets."
            echo "Add these under Settings → Secrets and variables → Actions → New repository secret:"
            echo "  DOCKERHUB_USERNAME  (e.g. becktkh)"
            echo "  DOCKERHUB_TOKEN     (Docker Hub access token, not your account password)"
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=match,pattern=collector-v(.*),group=1
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/djangoWebApp' }}
      - uses: docker/build-push-action@v6
        with:
          context: SensorDataCollector
          file: SensorDataCollector/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=collector
          cache-to: type=gha,mode=max,scope=collector
