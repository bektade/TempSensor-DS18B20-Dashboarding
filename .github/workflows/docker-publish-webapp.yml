# Build and push WebApp image to Docker Hub (independent of collector).
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN

name: Docker Hub — WebApp

on:
  push:
    branches: [djangoWebApp]
    tags: ["webapp-v*"]
    paths:
      - "WebApp/**"
      - ".github/workflows/docker-publish-webapp.yml"
  pull_request:
    branches: [djangoWebApp]
    paths:
      - "WebApp/**"
      - ".github/workflows/docker-publish-webapp.yml"
  workflow_dispatch:

concurrency:
  group: docker-publish-webapp-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/tempsensor-webapp

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: WebApp
          file: WebApp/Dockerfile
          push: false
          tags: tempsensor-webapp:ci
          cache-from: type=gha,scope=webapp
          cache-to: type=gha,mode=max,scope=webapp

  publish:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=match,pattern=webapp-v(.*),group=1
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/djangoWebApp' }}
      - uses: docker/build-push-action@v6
        with:
          context: WebApp
          file: WebApp/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=webapp
          cache-to: type=gha,mode=max,scope=webapp
