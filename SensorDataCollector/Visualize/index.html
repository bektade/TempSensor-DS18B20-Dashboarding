<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TempSensor comparison</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    html, body {
      height: 100%;
    }
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 1rem 1.25rem;
      box-sizing: border-box;
      background: #f5f7fa;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: none;
      margin: 0;
      min-height: 0;
    }
    .chart-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    h1 {
      margin: 0 0 0.25rem;
      font-size: 1.5rem;
    }
    .meta {
      margin: 0 0 1rem;
      color: #555;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
      align-items: flex-end;
      margin-bottom: 1rem;
      padding: 1rem;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }
    .control label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.35rem;
      color: #444;
    }
    select {
      min-width: 11rem;
      padding: 0.45rem 0.6rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
    }
    .unit-toggle {
      display: flex;
      gap: 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      overflow: hidden;
    }
    .unit-toggle button {
      padding: 0.45rem 1rem;
      border: none;
      background: #fff;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .unit-toggle button.active {
      background: #2563eb;
      color: #fff;
    }
    .error {
      padding: 1rem;
      border-radius: 8px;
      background: #fde8e8;
      color: #8a1f1f;
    }
    #chart {
      flex: 1;
      width: 100%;
      min-height: 0;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }
  </style>
</head>
<body>
  <main>
    {% if error %}
    <p class="error">{{ error }}</p>
    {% else %}
    <div class="controls">
      <div class="control">
        <label for="sensor-select">Sensor</label>
        <select id="sensor-select">
          <option value="all">All sensors (compare)</option>
          {% for label in sensor_labels %}
          <option value="{{ label }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="control">
        <label for="window-select">Time window</label>
        <select id="window-select">
          <option value="5">5 Min</option>
          <option value="10">10 Min</option>
          <option value="30">30 Min</option>
          <option value="60">60 Min</option>
          <option value="90" selected>90 Min</option>
        </select>
      </div>
      <div class="control">
        <label>Temperature unit</label>
        <div class="unit-toggle" role="group" aria-label="Temperature unit">
          <button type="button" id="unit-c" class="active" aria-pressed="true">°C</button>
          <button type="button" id="unit-f" aria-pressed="false">°F</button>
        </div>
      </div>
    </div>
    <div class="chart-wrap">
      <div id="chart"></div>
    </div>
    <script>
      const readings = {{ readings_json | safe }};
      const chartTitle = {{ chart_title | tojson }};
      const WINDOW_OPTIONS = {
        5: { minutes: 5, sampleIntervalMs: null, label: 'all readings (30 sec)' },
        10: { minutes: 10, sampleIntervalMs: 60 * 1000, label: 'every 1 min' },
        30: { minutes: 30, sampleIntervalMs: 2 * 60 * 1000, label: 'every 2 min' },
        60: { minutes: 60, sampleIntervalMs: 5 * 60 * 1000, label: 'every 5 min' },
        90: { minutes: 90, sampleIntervalMs: 5 * 60 * 1000, label: 'every 5 min' },
      };
      const Y_MIN_F = 70;
      const Y_MAX_F = 160;
      const Y_DTICK_F = 10;
      const Y_MIN_C = 21;
      const Y_MAX_C = 70;
      const Y_DTICK_C = 5;
      const GRID_MAJOR = 'rgba(120, 120, 120, 0.12)';
      const GRID_MINOR = 'rgba(120, 120, 120, 0.05)';
      const TICK_MAJOR = 'rgba(120, 120, 120, 0.18)';
      const TICK_LABEL = 'rgba(60, 60, 60, 0.75)';
      const AXIS_TITLE_FONT = { size: 20, weight: 'bold', color: '#111111' };
      const AXIS_TICK_FONT = { size: 15, weight: 'bold', color: '#111111' };
      const VERTICAL_GRID_MINUTES = [15, 30, 45, 60, 75, 90];
      const VERTICAL_GRID_COLOR = 'rgba(90, 90, 90, 0.5)';
      const VERTICAL_GRID_WIDTH = 1;
      const HORIZONTAL_GRID_TEMPS_F = [150, 130, 110, 90];
      const HORIZONTAL_GRID_TEMPS_C = [70, 60, 50, 40, 30];
      const HORIZONTAL_GRID_COLOR = 'rgba(220, 38, 38, 0.5)';
      const HORIZONTAL_GRID_WIDTH = 1;
      const REFERENCE_BORDER_COLOR = 'rgba(0, 0, 0, 0.5)';
      const REFERENCE_BORDER_WIDTH = 1;
      let unit = 'C';

      function horizontalReferenceTemps() {
        if (unit === 'F') {
          return HORIZONTAL_GRID_TEMPS_F.map((value) => ({ y: value }));
        }
        return HORIZONTAL_GRID_TEMPS_C.map((value) => ({ y: value }));
      }

      function chartHeight() {
        return document.getElementById('chart').clientHeight;
      }

      function buildYAxis() {
        const unitLabel = unit === 'C' ? '°C' : '°F';
        const yMin = unit === 'F' ? Y_MIN_F : Y_MIN_C;
        const yMax = unit === 'F' ? Y_MAX_F : Y_MAX_C;

        const yAxisBase = {
          title: {
            text: `Temperature (${unitLabel})`,
            font: AXIS_TITLE_FONT,
          },
          range: [yMin, yMax],
          ticklen: 3,
          tickwidth: 1,
          tickcolor: TICK_MAJOR,
          tickfont: AXIS_TICK_FONT,
          ticks: 'outside',
          ticksuffix: unitLabel,
          showgrid: true,
          gridwidth: 0.5,
          gridcolor: GRID_MINOR,
          zeroline: false,
        };

        if (unit === 'C') {
          return {
            ...yAxisBase,
            tickmode: 'linear',
            tick0: 20,
            dtick: Y_DTICK_C,
          };
        }

        return {
          ...yAxisBase,
          tickmode: 'linear',
          tick0: Y_MIN_F,
          dtick: Y_DTICK_F,
        };
      }

      function parseTimestamp(ts) {
        return new Date(ts.replace(' ', 'T'));
      }

      function formatClockTime(date, withSeconds = false) {
        const options = {
          hour: 'numeric',
          minute: '2-digit',
          hour12: true,
        };
        if (withSeconds) {
          options.second = '2-digit';
        }
        return date.toLocaleTimeString('en-US', options);
      }

      function addVerticalAxisLabel(annotations, x, text, position, xanchor = 'center') {
        const isTop = position === 'top';
        annotations.push({
          x,
          y: isTop ? 1 : 0,
          xref: 'x',
          yref: 'paper',
          text,
          showarrow: false,
          xanchor,
          yanchor: isTop ? 'bottom' : 'top',
          font: AXIS_TICK_FONT,
          bgcolor: 'rgba(255, 255, 255, 0.9)',
          borderpad: 3,
        });
      }

      function windowStart() {
        let earliest = null;
        for (const label of Object.keys(readings)) {
          for (const point of readings[label]) {
            const t = parseTimestamp(point.timestamp);
            if (!earliest || t < earliest) {
              earliest = t;
            }
          }
        }
        return earliest || new Date();
      }

      function selectedWindow() {
        const minutes = Number(document.getElementById('window-select').value);
        return WINDOW_OPTIONS[minutes] || WINDOW_OPTIONS[90];
      }

      function windowRange() {
        const { minutes } = selectedWindow();
        const start = windowStart();
        const end = new Date(start.getTime() + minutes * 60 * 1000);
        return { start, end };
      }

      function sampleByInterval(points, start, end, intervalMs) {
        if (points.length === 0) {
          return [];
        }
        const startMs = start.getTime();
        const endMs = end.getTime();
        const sampled = [];
        const seen = new Set();

        for (let slotMs = startMs; slotMs <= endMs; slotMs += intervalMs) {
          let best = null;
          let bestDiff = Infinity;
          for (const point of points) {
            const diff = Math.abs(parseTimestamp(point.timestamp).getTime() - slotMs);
            if (diff < bestDiff) {
              bestDiff = diff;
              best = point;
            }
          }
          if (best && !seen.has(best.timestamp)) {
            seen.add(best.timestamp);
            sampled.push(best);
          }
        }
        return sampled;
      }

      function pointsInWindow(label) {
        const { sampleIntervalMs } = selectedWindow();
        const { start, end } = windowRange();
        const inRange = readings[label]
          .filter((point) => {
            const t = parseTimestamp(point.timestamp);
            return t >= start && t <= end;
          })
          .sort((a, b) => parseTimestamp(a.timestamp) - parseTimestamp(b.timestamp));

        if (sampleIntervalMs === null) {
          return inRange;
        }
        return sampleByInterval(inRange, start, end, sampleIntervalMs);
      }

      function chartHeadline() {
        return chartTitle;
      }

      function activeSensors() {
        const choice = document.getElementById('sensor-select').value;
        if (choice === 'all') {
          return Object.keys(readings).sort();
        }
        return readings[choice] ? [choice] : [];
      }

      function buildTraces() {
        const tempKey = unit === 'C' ? 'temp_c' : 'temp_f';
        return activeSensors().map((label) => {
          const points = pointsInWindow(label);
          return {
            x: points.map((p) => p.timestamp),
            y: points.map((p) => p[tempKey]),
            mode: 'lines+markers',
            marker: { size: 9 },
            name: label,
            type: 'scatter',
          };
        });
      }

      function buildXAxisTicks() {
        const sessionStart = windowStart();
        const { start, end } = windowRange();
        const startMs = start.getTime();
        const endMs = end.getTime();
        const tickvals = [];
        const ticktext = [];
        const sessionStartMs = sessionStart.getTime();

        if (sessionStartMs >= startMs && sessionStartMs <= endMs) {
          tickvals.push(sessionStart);
          ticktext.push(formatClockTime(sessionStart, true));
        }

        VERTICAL_GRID_MINUTES.forEach((minutes) => {
          const x = new Date(sessionStartMs + minutes * 60 * 1000);
          if (x.getTime() >= startMs && x.getTime() <= endMs) {
            tickvals.push(x);
            ticktext.push(formatClockTime(x));
          }
        });

        return { tickvals, ticktext };
      }

      function buildVerticalMinuteGrids() {
        const sessionStart = windowStart();
        const { start, end } = windowRange();
        const startMs = start.getTime();
        const endMs = end.getTime();
        const shapes = [];
        const annotations = [];
        const sessionStartMs = sessionStart.getTime();

        VERTICAL_GRID_MINUTES.forEach((minutes) => {
          const x = new Date(sessionStartMs + minutes * 60 * 1000);
          const xMs = x.getTime();
          if (xMs < startMs || xMs > endMs) {
            return;
          }
          shapes.push({
            type: 'line',
            xref: 'x',
            yref: 'paper',
            x0: x,
            x1: x,
            y0: 0,
            y1: 1,
            line: {
              color: VERTICAL_GRID_COLOR,
              width: VERTICAL_GRID_WIDTH,
              dash: 'dash',
            },
            layer: 'below',
          });
          addVerticalAxisLabel(annotations, x, `${minutes} Min`, 'top');
        });

        return { shapes, annotations };
      }

      function buildHorizontalTempGrids() {
        const shapes = [];
        const yMin = unit === 'F' ? Y_MIN_F : Y_MIN_C;
        const yMax = unit === 'F' ? Y_MAX_F : Y_MAX_C;

        horizontalReferenceTemps().forEach(({ y }) => {
          if (y < yMin || y > yMax) {
            return;
          }
          shapes.push({
            type: 'line',
            xref: 'paper',
            yref: 'y',
            x0: 0,
            x1: 1,
            y0: y,
            y1: y,
            line: {
              color: HORIZONTAL_GRID_COLOR,
              width: HORIZONTAL_GRID_WIDTH,
              dash: 'dash',
            },
            layer: 'below',
          });
        });

        return shapes;
      }

      function buildReferenceBorders() {
        const sessionStart = windowStart();
        const { start, end } = windowRange();
        const yMin = unit === 'F' ? Y_MIN_F : Y_MIN_C;
        const yMax = unit === 'F' ? Y_MAX_F : Y_MAX_C;
        const line = {
          color: REFERENCE_BORDER_COLOR,
          width: REFERENCE_BORDER_WIDTH,
        };

        return [
          {
            type: 'line',
            xref: 'x',
            yref: 'y',
            x0: sessionStart,
            x1: sessionStart,
            y0: yMin,
            y1: yMax,
            line,
            layer: 'below',
          },
          {
            type: 'line',
            xref: 'x',
            yref: 'y',
            x0: start,
            x1: end,
            y0: yMin,
            y1: yMin,
            line,
            layer: 'below',
          },
          {
            type: 'line',
            xref: 'x',
            yref: 'y',
            x0: end,
            x1: end,
            y0: yMin,
            y1: yMax,
            line,
            layer: 'below',
          },
          {
            type: 'line',
            xref: 'x',
            yref: 'y',
            x0: start,
            x1: end,
            y0: yMax,
            y1: yMax,
            line,
            layer: 'below',
          },
        ];
      }

      function buildLayout() {
        const { start, end } = windowRange();
        const xTicks = buildXAxisTicks();
        const minuteGrids = buildVerticalMinuteGrids();
        const tempGrids = buildHorizontalTempGrids();
        const referenceBorders = buildReferenceBorders();
        return {
          title: {
            text: chartHeadline(),
            font: { size: 18, weight: 'bold' },
            x: 0.5,
            xanchor: 'center',
          },
          autosize: true,
          height: chartHeight(),
          margin: { l: 88, r: 40, t: 72, b: 88 },
          xaxis: {
            type: 'date',
            title: {
              text: 'Time',
              font: AXIS_TITLE_FONT,
            },
            range: [start, end],
            fixedrange: true,
            tickmode: 'array',
            tickvals: xTicks.tickvals,
            ticktext: xTicks.ticktext,
            hoverformat: '%I:%M:%S %p',
            ticklen: 3,
            tickwidth: 1,
            tickcolor: TICK_MAJOR,
            tickfont: AXIS_TICK_FONT,
            ticks: 'outside',
            showgrid: true,
            gridwidth: 0.5,
            gridcolor: GRID_MINOR,
            zeroline: false,
          },
          yaxis: buildYAxis(),
          shapes: [...minuteGrids.shapes, ...tempGrids, ...referenceBorders],
          annotations: minuteGrids.annotations,
          hovermode: 'x unified',
          legend: { title: { text: 'Sensor' } },
          paper_bgcolor: '#fff',
          plot_bgcolor: '#fff',
        };
      }

      function renderChart() {
        Plotly.react('chart', buildTraces(), buildLayout(), { responsive: true });
      }

      window.addEventListener('resize', renderChart);

      document.getElementById('sensor-select').addEventListener('change', renderChart);
      document.getElementById('window-select').addEventListener('change', renderChart);

      document.getElementById('unit-c').addEventListener('click', () => {
        unit = 'C';
        document.getElementById('unit-c').classList.add('active');
        document.getElementById('unit-c').setAttribute('aria-pressed', 'true');
        document.getElementById('unit-f').classList.remove('active');
        document.getElementById('unit-f').setAttribute('aria-pressed', 'false');
        renderChart();
      });

      document.getElementById('unit-f').addEventListener('click', () => {
        unit = 'F';
        document.getElementById('unit-f').classList.add('active');
        document.getElementById('unit-f').setAttribute('aria-pressed', 'true');
        document.getElementById('unit-c').classList.remove('active');
        document.getElementById('unit-c').setAttribute('aria-pressed', 'false');
        renderChart();
      });

      requestAnimationFrame(renderChart);
    </script>
    {% endif %}
  </main>
</body>
</html>
