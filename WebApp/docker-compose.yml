services:
  postgres:
    image: postgres:16-alpine
    container_name: sauna-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sauna_tests}
      POSTGRES_USER: ${POSTGRES_USER:-sauna_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sauna_user} -d ${POSTGRES_DB:-sauna_tests}"]
      interval: 5s
      timeout: 5s
      retries: 10

  django_web:
    build: .
    container_name: sauna-django
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ./data:/app/data
    ports:
      - "${DJANGO_PUBLISH_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
