apiVersion: 1

datasources:
  - name: InfluxDB
    uid: influxdb-tempsensor
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    editable: false
    jsonData:
      version: Flux
      organization: tempsensor
      defaultBucket: temperature
      tlsSkipVerify: true
    secureJsonData:
      token: change-me-influx-admin-token
